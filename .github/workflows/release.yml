name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Extract SHA tag
        id: image
        run: |
          SHA_TAG=$(echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | grep 'sha-')
          echo "tag=${SHA_TAG##*:}" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Published Image
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          severity: CRITICAL
          exit-code: "1"

    outputs:
      image-tag: ${{ steps.image.outputs.tag }}

  update-gitops:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ivanderkendrick/express-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update Image Tag
        run: |
          sed -i 's/newTag:.*/newTag: ${{ needs.publish.outputs.image-tag }}/' \
          gitops/k8s/base/kustomization.yaml

      - name: Commit and Push Changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "chore: update image to ${{ needs.publish.outputs.image-tag }}"
          git push
